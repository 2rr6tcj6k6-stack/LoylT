<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loyalty Drawer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --ink:#1B2430;
    --petrol:#24313D;
    --petrol-light:#324454;
    --cream:#EDE0C4;
    --cream-dark:#DFCE9F;
    --brass:#C9A227;
    --brass-light:#E0BC4C;
    --rust:#B33A3A;
    --paper-text:#2A2013;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{position:relative; height:100vh; width:100vw; max-width:520px; margin:0 auto; background:var(--ink); overflow:hidden;}
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    transform:translateX(0); transition:transform .32s ease, opacity .32s ease; opacity:1;
  }
  .screen.hidden{pointer-events:none; opacity:0;}
  .screen.slide-right{transform:translateX(100%);}

  /* ---------- HOME ---------- */
  header.top{
    padding:22px 20px 14px;
    border-bottom:1px solid var(--petrol-light);
    flex-shrink:0;
  }
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--brass-light); text-transform:uppercase;}
  h1.title{font-family:'Special Elite',cursive; font-size:26px; margin:4px 0 0; color:var(--cream); letter-spacing:.02em;}

  #cardList{flex:1; overflow-y:auto; padding:16px 16px 100px;}
  .empty{
    margin-top:20%; text-align:center; color:#8AA0AF; padding:0 30px;
    font-family:'Inter'; font-size:14px; line-height:1.6;
  }
  .empty b{color:var(--cream); display:block; font-family:'Special Elite'; font-size:18px; margin-bottom:8px;}

  .index-card{
    position:relative;
    background:var(--cream);
    color:var(--paper-text);
    border-radius:3px 8px 8px 3px;
    margin-bottom:12px;
    padding:14px 16px 14px 22px;
    box-shadow:0 3px 0 rgba(0,0,0,.25), 0 6px 14px rgba(0,0,0,.28);
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
    transform:scale(1);
    transition:transform .12s ease;
  }
  .index-card:active{transform:scale(.98);}
  .index-card::before{
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:8px;
    background:var(--tag,var(--rust));
    border-radius:3px 0 0 3px;
  }
  .index-card .body{flex:1; min-width:0;}
  .index-card .name{font-family:'Special Elite',cursive; font-size:16px; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .index-card .meta{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6b5f45; margin-top:3px; letter-spacing:.03em;}
  .index-card .stamp{
    font-family:'IBM Plex Mono',monospace; font-size:9px; color:#8a7c58; border:1px solid #8a7c58;
    border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    transform:rotate(-8deg); text-align:center; line-height:1.1; flex-shrink:0; opacity:.75;
  }
  .kebab{background:none; border:none; color:#8a7c58; font-size:18px; padding:4px 6px; cursor:pointer; flex-shrink:0;}

  .fab{
    position:absolute; right:20px; bottom:28px;
    width:58px; height:58px; border-radius:50%;
    background:var(--brass); color:var(--ink); border:none;
    font-size:28px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
  }
  .fab:active{background:var(--brass-light);}

  /* ---------- SCAN ---------- */
  .bar{
    display:flex; align-items:center; gap:10px; padding:16px 16px;
    border-bottom:1px solid var(--petrol-light); flex-shrink:0;
  }
  .iconbtn{background:none; border:none; color:var(--cream); font-size:20px; cursor:pointer; padding:4px 8px;}
  .bar h2{font-family:'Special Elite'; font-size:17px; margin:0; flex:1;}

  #readerWrap{flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  #reader{width:100%; height:100%;}
  #reader video{object-fit:cover; width:100%!important; height:100%!important;}
  .viewfinder{
    position:absolute; inset:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
  }
  .frame{width:78%; max-width:320px; aspect-ratio:16/10; position:relative;}
  .frame span{position:absolute; width:26px; height:26px; border:3px solid var(--brass);}
  .frame span:nth-child(1){top:0;left:0;border-right:none;border-bottom:none;}
  .frame span:nth-child(2){top:0;right:0;border-left:none;border-bottom:none;}
  .frame span:nth-child(3){bottom:0;left:0;border-right:none;border-top:none;}
  .frame span:nth-child(4){bottom:0;right:0;border-left:none;border-top:none;}
  .scanhint{position:absolute; bottom:18px; left:0; right:0; text-align:center; color:#cfd8dd; font-size:13px; font-family:'Inter';}
  .scanFail{padding:24px; text-align:center; color:#cfd8dd; font-size:14px; line-height:1.6;}

  .manualLink{
    text-align:center; padding:14px; flex-shrink:0; border-top:1px solid var(--petrol-light);
  }
  .manualLink a{color:var(--brass-light); font-size:13px; font-family:'Inter'; text-decoration:underline; cursor:pointer;}

  /* ---------- FORM (details/edit/manual) ---------- */
  .formArea{flex:1; overflow-y:auto; padding:20px;}
  .field{margin-bottom:20px;}
  .field label{display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--brass-light); margin-bottom:8px;}
  .field input, .field select{
    width:100%; padding:12px 14px; border-radius:6px; border:1px solid var(--petrol-light);
    background:var(--petrol); color:var(--cream); font-family:'Inter'; font-size:15px;
  }
  .field input:focus, .field select:focus{outline:2px solid var(--brass); outline-offset:1px;}
  .valueChip{
    font-family:'IBM Plex Mono',monospace; font-size:13px; background:var(--petrol); border:1px dashed var(--petrol-light);
    padding:10px 12px; border-radius:6px; word-break:break-all; color:#cfe3ee;
  }
  .swatches{display:flex; gap:10px; flex-wrap:wrap;}
  .swatch{width:34px; height:34px; border-radius:50%; cursor:pointer; border:3px solid transparent;}
  .swatch.selected{border-color:var(--cream);}
  .primaryBtn{
    width:100%; padding:14px; background:var(--brass); color:var(--ink); border:none; border-radius:8px;
    font-family:'Inter'; font-weight:700; font-size:15px; cursor:pointer; margin-top:6px;
  }
  .primaryBtn:active{background:var(--brass-light);}
  .dangerBtn{
    width:100%; padding:14px; background:transparent; color:#e08a8a; border:1px solid #6b3a3a; border-radius:8px;
    font-family:'Inter'; font-weight:600; font-size:14px; cursor:pointer; margin-top:14px;
  }

  /* ---------- DISPLAY (checkout) ---------- */
  #displayScreen{background:#FAF7EE; color:#1B2430;}
  .dispTop{display:flex; justify-content:space-between; align-items:center; padding:16px 18px 0; flex-shrink:0;}
  .closeX{background:none; border:none; font-size:22px; color:#1B2430; cursor:pointer;}
  .dispBody{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;}
  .dispName{font-family:'Special Elite'; font-size:24px; margin-bottom:22px; color:#1B2430;}
  .dispCode{background:#fff; padding:18px; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.08); max-width:100%;}
  .dispCode svg, .dispCode img{max-width:100%; height:auto;}
  .dispValue{font-family:'IBM Plex Mono',monospace; margin-top:16px; font-size:15px; letter-spacing:.05em; color:#4a4232;}
  .dispHint{font-size:12px; color:#8a7c58; margin-top:26px; font-family:'Inter';}

  /* ---------- ACTION SHEET ---------- */
  #sheetOverlay{position:absolute; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; z-index:20;}
  #sheetOverlay.show{display:flex;}
  .sheet{
    width:100%; background:var(--petrol); border-radius:16px 16px 0 0; padding:8px 0 22px;
  }
  .sheetItem{padding:16px 24px; font-family:'Inter'; font-size:15px; color:var(--cream); cursor:pointer; border-bottom:1px solid var(--petrol-light);}
  .sheetItem:last-child{border-bottom:none;}
  .sheetItem.danger{color:#e08a8a;}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen" id="homeScreen">
    <header class="top">
      <div class="eyebrow">Loyalty Drawer</div>
      <h1 class="title">Your Cards</h1>
    </header>
    <div id="cardList"></div>
    <button class="fab" id="addBtn" aria-label="Add card">+</button>
  </div>

  <!-- SCAN -->
  <div class="screen hidden slide-right" id="scanScreen">
    <div class="bar">
      <button class="iconbtn" id="scanBack">&#8592;</button>
      <h2>Scan a card</h2>
    </div>
    <div id="readerWrap">
      <div id="reader"></div>
      <div class="viewfinder" id="viewfinderUI">
        <div class="frame"><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="scanhint" id="scanhintText">Hold the barcode inside the frame</div>
    </div>
    <div class="manualLink"><a id="manualEntryLink">Can't scan it? Enter the code manually</a></div>
  </div>

  <!-- DETAILS (after scan / manual, before save) -->
  <div class="screen hidden slide-right" id="detailsScreen">
    <div class="bar">
      <button class="iconbtn" id="detailsBack">&#8592;</button>
      <h2 id="detailsHeading">New card</h2>
    </div>
    <div class="formArea">
      <div class="field" id="valueFieldWrap">
        <label>Scanned code</label>
        <div class="valueChip" id="scannedValueChip"></div>
      </div>
      <div class="field" id="manualFieldsWrap" style="display:none;">
        <label>Code / number</label>
        <input type="text" id="manualValueInput" inputmode="text" placeholder="e.g. 5012345678900">
      </div>
      <div class="field" id="manualFormatWrap" style="display:none;">
        <label>Barcode type</label>
        <select id="manualFormatSelect">
          <option value="CODE_128">Code 128 (most common)</option>
          <option value="EAN_13">EAN-13</option>
          <option value="EAN_8">EAN-8</option>
          <option value="UPC_A">UPC-A</option>
          <option value="CODE_39">Code 39</option>
          <option value="CODABAR">Codabar</option>
          <option value="QR_CODE">QR code</option>
        </select>
      </div>
      <div class="field">
        <label>Store name</label>
        <input type="text" id="storeNameInput" placeholder="e.g. Green Grocer">
      </div>
      <div class="field">
        <label>Tab colour</label>
        <div class="swatches" id="colorSwatches"></div>
      </div>
      <button class="primaryBtn" id="saveCardBtn">Save card</button>
      <button class="dangerBtn hidden" id="deleteCardBtn">Delete card</button>
    </div>
  </div>

  <!-- DISPLAY -->
  <div class="screen hidden slide-right" id="displayScreen">
    <div class="dispTop">
      <span></span>
      <button class="closeX" id="closeDisplay">&#10005;</button>
    </div>
    <div class="dispBody">
      <div class="dispName" id="dispName"></div>
      <div class="dispCode" id="dispCode"></div>
      <div class="dispValue" id="dispValue"></div>
      <div class="dispHint">Tip: turn your screen brightness all the way up</div>
    </div>
  </div>

  <!-- ACTION SHEET -->
  <div id="sheetOverlay">
    <div class="sheet">
      <div class="sheetItem" id="sheetView">View barcode</div>
      <div class="sheetItem" id="sheetEdit">Edit card</div>
      <div class="sheetItem danger" id="sheetDelete">Delete card</div>
    </div>
  </div>

</div>

<script>
(function(){
  const COLORS = ['#B33A3A','#C9A227','#3A7D62','#3A5F8A','#7A4A9E','#8A5A2B'];
  let state = { cards: [] };
  let html5QrCode = null;
  let pendingScan = null; // {value, format}
  let editingId = null; // if set, details screen is editing this card
  let sheetCardId = null;

  const $ = id => document.getElementById(id);

  // ---------- STORAGE ----------
  // Cards are saved with localStorage, which keeps them only on this device's
  // browser. Nothing here is uploaded anywhere, including to GitHub.
  const STORAGE_KEY = 'loyaltyDrawerCards';
  async function loadCards(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      state.cards = raw ? JSON.parse(raw) : [];
    }catch(e){
      state.cards = [];
    }
    renderList();
  }
  async function saveCards(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cards));
    }catch(e){
      console.error('Could not save cards', e);
      alert('Could not save your card. Your browser may be blocking storage (e.g. private/incognito mode).');
    }
  }

  // ---------- NAV ----------
  function show(screenId){
    document.querySelectorAll('.screen').forEach(s=>{
      if(s.id === screenId){ s.classList.remove('hidden'); s.classList.remove('slide-right'); }
      else { s.classList.add('hidden'); }
    });
  }

  // ---------- HOME LIST ----------
  function timeAgo(ts){
    if(!ts) return 'never used';
    const d = Math.floor((Date.now()-ts)/86400000);
    if(d<=0) return 'today';
    if(d===1) return '1d ago';
    if(d<30) return d+'d ago';
    return Math.floor(d/30)+'mo ago';
  }

  function renderList(){
    const list = $('cardList');
    if(!state.cards.length){
      list.innerHTML = '<div class="empty"><b>Drawer\'s empty</b>Tap the + button to scan your first loyalty card.</div>';
      return;
    }
    list.innerHTML = '';
    state.cards.forEach(card=>{
      const el = document.createElement('div');
      el.className = 'index-card';
      el.style.setProperty('--tag', card.color || '#B33A3A');
      el.innerHTML = `
        <div class="body">
          <div class="name">${escapeHtml(card.name)}</div>
          <div class="meta">${labelForFormat(card.format)} &middot; last used ${timeAgo(card.lastUsed)}</div>
        </div>
        <div class="stamp">USE</div>
        <button class="kebab" data-id="${card.id}">&#8942;</button>
      `;
      el.addEventListener('click', (e)=>{
        if(e.target.closest('.kebab')) return;
        openDisplay(card.id);
      });
      el.querySelector('.kebab').addEventListener('click', (e)=>{
        e.stopPropagation();
        openSheet(card.id);
      });
      list.appendChild(el);
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function labelForFormat(fmt){
    const map = {QR_CODE:'QR code', EAN_13:'EAN-13', EAN_8:'EAN-8', UPC_A:'UPC-A', UPC_E:'UPC-E',
      CODE_128:'Code 128', CODE_39:'Code 39', CODABAR:'Codabar', ITF:'ITF'};
    return map[fmt] || fmt;
  }

  // ---------- ACTION SHEET ----------
  function openSheet(id){
    sheetCardId = id;
    $('sheetOverlay').classList.add('show');
  }
  function closeSheet(){
    $('sheetOverlay').classList.remove('show');
    sheetCardId = null;
  }
  $('sheetOverlay').addEventListener('click', (e)=>{ if(e.target.id==='sheetOverlay') closeSheet(); });
  $('sheetView').addEventListener('click', ()=>{ const id=sheetCardId; closeSheet(); openDisplay(id); });
  $('sheetEdit').addEventListener('click', ()=>{ const id=sheetCardId; closeSheet(); openEdit(id); });
  $('sheetDelete').addEventListener('click', async ()=>{
    const id = sheetCardId; closeSheet();
    if(confirm('Delete this card? This can\'t be undone.')){
      state.cards = state.cards.filter(c=>c.id!==id);
      await saveCards();
      renderList();
    }
  });

  // ---------- SCAN SCREEN ----------
  $('addBtn').addEventListener('click', startScanFlow);
  $('scanBack').addEventListener('click', ()=>{ stopScanner(); show('homeScreen'); });

  function startScanFlow(){
    editingId = null;
    show('scanScreen');
    $('scanhintText').textContent = 'Hold the barcode inside the frame';
    $('viewfinderUI').style.display = 'flex';
    startScanner();
  }

  function startScanner(){
    if(html5QrCode){ return; }
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 260, height: 160 } },
      (decodedText, decodedResult) => {
        let fmt = 'CODE_128';
        try{ fmt = decodedResult.result.format.formatName; }catch(e){}
        onScanSuccess(decodedText, fmt);
      },
      (errorMsg) => { /* per-frame scan miss, ignore */ }
    ).catch(err=>{
      $('viewfinderUI').style.display='none';
      $('reader').innerHTML = '<div class="scanFail">Couldn\'t access the camera. Check your browser\'s camera permission, or enter the code by hand.</div>';
    });
  }

  function stopScanner(){
    if(html5QrCode){
      html5QrCode.stop().then(()=>{
        html5QrCode.clear();
        html5QrCode = null;
      }).catch(()=>{ html5QrCode = null; });
    }
    $('reader').innerHTML = '';
  }

  function onScanSuccess(value, format){
    stopScanner();
    pendingScan = { value, format };
    openDetailsForNewCard(false);
  }

  $('manualEntryLink').addEventListener('click', ()=>{
    stopScanner();
    pendingScan = null;
    openDetailsForNewCard(true);
  });

  // ---------- DETAILS (new card) ----------
  function buildSwatches(selected){
    const wrap = $('colorSwatches');
    wrap.innerHTML = '';
    COLORS.forEach(c=>{
      const sw = document.createElement('div');
      sw.className = 'swatch' + (c===selected?' selected':'');
      sw.style.background = c;
      sw.dataset.color = c;
      sw.addEventListener('click', ()=>{
        wrap.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected');
      });
      wrap.appendChild(sw);
    });
  }

  function openDetailsForNewCard(manual){
    editingId = null;
    $('detailsHeading').textContent = 'New card';
    $('deleteCardBtn').classList.add('hidden');
    $('storeNameInput').value = '';
    buildSwatches(COLORS[state.cards.length % COLORS.length]);

    if(manual){
      $('valueFieldWrap').style.display = 'none';
      $('manualFieldsWrap').style.display = 'block';
      $('manualFormatWrap').style.display = 'block';
      $('manualValueInput').value = '';
      $('manualFormatSelect').value = 'CODE_128';
    } else {
      $('valueFieldWrap').style.display = 'block';
      $('manualFieldsWrap').style.display = 'none';
      $('manualFormatWrap').style.display = 'none';
      $('scannedValueChip').textContent = pendingScan.value + '  (' + labelForFormat(pendingScan.format) + ')';
    }
    show('detailsScreen');
  }

  function openEdit(id){
    const card = state.cards.find(c=>c.id===id);
    if(!card) return;
    editingId = id;
    pendingScan = { value: card.value, format: card.format };
    $('detailsHeading').textContent = 'Edit card';
    $('deleteCardBtn').classList.remove('hidden');
    $('storeNameInput').value = card.name;
    buildSwatches(card.color);
    $('valueFieldWrap').style.display = 'block';
    $('manualFieldsWrap').style.display = 'none';
    $('manualFormatWrap').style.display = 'none';
    $('scannedValueChip').textContent = card.value + '  (' + labelForFormat(card.format) + ')';
    show('detailsScreen');
  }

  $('detailsBack').addEventListener('click', ()=>{ show('homeScreen'); });

  $('saveCardBtn').addEventListener('click', async ()=>{
    const name = $('storeNameInput').value.trim();
    if(!name){ alert('Give the card a store name so you can find it later.'); return; }
    const selectedSwatch = document.querySelector('#colorSwatches .swatch.selected');
    const color = selectedSwatch ? selectedSwatch.dataset.color : COLORS[0];

    let value, format;
    if($('manualFieldsWrap').style.display === 'block'){
      value = $('manualValueInput').value.trim();
      format = $('manualFormatSelect').value;
      if(!value){ alert('Enter the code printed on your card.'); return; }
    } else {
      value = pendingScan.value;
      format = pendingScan.format;
    }

    if(editingId){
      const card = state.cards.find(c=>c.id===editingId);
      card.name = name; card.color = color; card.value = value; card.format = format;
    } else {
      state.cards.push({
        id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        name, color, value, format,
        createdAt: Date.now(), lastUsed: null
      });
    }
    await saveCards();
    renderList();
    show('homeScreen');
  });

  $('deleteCardBtn').addEventListener('click', async ()=>{
    if(!editingId) return;
    if(confirm('Delete this card? This can\'t be undone.')){
      state.cards = state.cards.filter(c=>c.id!==editingId);
      await saveCards();
      renderList();
      show('homeScreen');
    }
  });

  // ---------- DISPLAY ----------
  function openDisplay(id){
    const card = state.cards.find(c=>c.id===id);
    if(!card) return;
    card.lastUsed = Date.now();
    saveCards();
    renderList();

    $('dispName').textContent = card.name;
    $('dispValue').textContent = card.value;
    const codeWrap = $('dispCode');
    codeWrap.innerHTML = '';

    if(card.format === 'QR_CODE'){
      new QRCode(codeWrap, { text: card.value, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
    } else {
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('id','barcodeSvg');
      codeWrap.appendChild(svg);
      const jsBarcodeFormatMap = {
        EAN_13:'EAN13', EAN_8:'EAN8', UPC_A:'UPC', UPC_E:'UPC',
        CODE_128:'CODE128', CODE_39:'CODE39', CODABAR:'codabar', ITF:'ITF14'
      };
      const fmt = jsBarcodeFormatMap[card.format] || 'CODE128';
      try{
        JsBarcode(svg, card.value, { format: fmt, lineColor:'#1B2430', width:2.2, height:90, displayValue:false, margin:6 });
      }catch(e){
        try{
          JsBarcode(svg, card.value, { format:'CODE128', lineColor:'#1B2430', width:2.2, height:90, displayValue:false, margin:6 });
        }catch(e2){
          codeWrap.innerHTML = '<div style="font-family:monospace;padding:20px;">Could not render barcode. Use the number below.</div>';
        }
      }
    }
    show('displayScreen');
  }

  $('closeDisplay').addEventListener('click', ()=>{ show('homeScreen'); });

  // ---------- INIT ----------
  loadCards();
})();
</script>
</body>
</html>
